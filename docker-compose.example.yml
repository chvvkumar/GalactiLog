# =============================================================================
# GalactiLog - Docker Compose
# =============================================================================
# 1. Copy this file:      cp docker-compose.example.yml docker-compose.yml
# 2. Edit lines marked:   <-- CHANGE
# 3. Start:               docker compose up -d
# 4. Open:                http://localhost:8080
#
# Database migrations run automatically on first start.
# Log in with the admin credentials you set below.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: galactilog
      POSTGRES_PASSWORD: galactilog
      POSTGRES_DB: galactilog_catalog
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # To use a host directory instead of a Docker volume, comment the line
      # above and uncomment below (the directory will be created automatically):
      # - /path/to/postgres/data:/var/lib/postgresql/data       # <-- CHANGE path
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: chvvkumar/galactilog:latest
    restart: unless-stopped
    ports:
      - "8080:80"                                                # <-- CHANGE host port if needed
    environment:
      # Database - must match the postgres service credentials above
      GALACTILOG_DATABASE_URL: postgresql+asyncpg://galactilog:galactilog@postgres:5432/galactilog_catalog
      GALACTILOG_REDIS_URL: redis://redis:6379/0

      # Container-internal paths (don't change these)
      GALACTILOG_FITS_DATA_PATH: /app/data/fits
      GALACTILOG_THUMBNAILS_PATH: /app/data/thumbnails

      # Admin account - created automatically on first start
      GALACTILOG_ADMIN_USERNAME: admin
      GALACTILOG_ADMIN_PASSWORD: changeme123                     # <-- CHANGE (min 8 characters)

      # Set to false if accessing over plain HTTP (no HTTPS / LAN access)
      GALACTILOG_HTTPS: "false"

      # Optional: persistent sessions across container restarts
      # Generate with: openssl rand -hex 32
      # GALACTILOG_JWT_SECRET: ""

      # Optional: read-only viewer account (created on first start alongside admin)
      # GALACTILOG_VIEWER_USERNAME: viewer
      # GALACTILOG_VIEWER_PASSWORD: ""
    volumes:
      - /path/to/your/fits/files:/app/data/fits:ro               # <-- CHANGE to your FITS directory
      - thumbnails_data:/app/data/thumbnails
      # To use a host directory for thumbnails instead of a Docker volume,
      # comment the line above and uncomment below:
      # - /path/to/thumbnails:/app/data/thumbnails               # <-- CHANGE path
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  thumbnails_data:
