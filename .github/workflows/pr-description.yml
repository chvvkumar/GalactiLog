name: Auto-generate PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-pr-description:
    runs-on: [self-hosted, Linux, X64]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR commits
        id: commits
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          MERGE_BASE=$(git merge-base "origin/$BASE_BRANCH" HEAD)
          COMMITS=$(git log --pretty=format:"- %s (%h)" "$MERGE_BASE"..HEAD 2>/dev/null || echo "Unable to retrieve commits")
          FILES_CHANGED=$(git diff --stat "$MERGE_BASE"...HEAD -- . ':!package-lock.json' ':!*.lock' 2>/dev/null || echo "Unable to get file stats")
          {
            echo "COMMITS:"
            echo "$COMMITS"
            echo ""
            echo "FILES CHANGED:"
            echo "$FILES_CHANGED"
          } > /tmp/pr_context.txt

      - name: Generate PR description with Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, os, re

          GEMINI_API_KEY = os.environ["GEMINI_API_KEY"]
          GITHUB_OUTPUT = os.environ["GITHUB_OUTPUT"]

          def fail(msg):
              print(f"::warning::{msg}")
              with open(GITHUB_OUTPUT, "a") as f:
                  f.write("api_success=false\n")
              sys.exit(0)

          # Read context from file (written by previous step)
          with open("/tmp/pr_context.txt") as f:
              context = f.read()

          prompt = f"""You are writing a pull request title and description based on the commit messages and files changed below. Write with confidence and authority -- these changes are definitive, not speculative. Never use hedging language like 'seems to', 'appears to', 'might', or 'likely'. State what the changes do, not what they seem to do.

          Do NOT use AI phraseology or filler words. Avoid words like: leverage, enhance, streamline, robust, seamless, comprehensive, cutting-edge, utilize, facilitate, empower, elevate, harness, spearhead, foster, bolster, pivotal, groundbreaking, synergy, paradigm, holistic, transformative. Write like a human developer -- plain, direct, technical language only.

          Generate:
          1. A brief, professional PR title (under 70 characters, no prefix like 'feat:' unless appropriate)
          2. A PR description in markdown with these sections:
             - **Summary**: 1-2 sentence overview of what this PR does
             - **Changes**: Bullet list of specific changes, derived from the commit messages
             - **Impact**: What areas of the codebase are affected

          IMPORTANT: Return your response in this exact format with the delimiters shown:
          ---TITLE_START---
          (your title here)
          ---TITLE_END---
          ---BODY_START---
          (your markdown description here)
          ---BODY_END---

          {context}"""

          # Build request JSON safely (no shell interpolation)
          request_body = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.3, "maxOutputTokens": 4096}
          })

          with open("/tmp/gemini_request.json", "w") as f:
              f.write(request_body)

          # Call Gemini API with request body from file
          result = subprocess.run(
              ["curl", "-s", "-o", "/tmp/gemini_response.json", "-w", "%{http_code}",
               "-X", "POST",
               f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={GEMINI_API_KEY}",
               "-H", "Content-Type: application/json",
               "-d", f"@/tmp/gemini_request.json"],
              capture_output=True, text=True
          )

          http_code = result.stdout.strip()
          if http_code != "200":
              fail(f"Gemini API returned HTTP {http_code}. Skipping PR description update.")

          # Parse response
          try:
              with open("/tmp/gemini_response.json") as f:
                  data = json.load(f)
              text = data["candidates"][0]["content"]["parts"][0]["text"]
          except (KeyError, IndexError, json.JSONDecodeError) as e:
              fail(f"Failed to parse Gemini response: {e}")

          # Extract title and body using delimiters (flexible whitespace matching)
          title_match = re.search(r"---\s*TITLE_START\s*---\s*\n(.+?)\n\s*---\s*TITLE_END\s*---", text)
          body_match = re.search(r"---\s*BODY_START\s*---\s*\n(.*?)\n\s*---\s*BODY_END\s*---", text, re.DOTALL)

          if not title_match or not body_match:
              # Log truncated response for debugging
              preview = text[:500] if len(text) > 500 else text
              fail(f"Could not extract title or body from Gemini response. Response preview: {preview}")

          pr_title = title_match.group(1).strip()
          pr_body = body_match.group(1).strip()

          pr_body += "\n\n---\n*This PR description was automatically generated.*\n"

          with open("/tmp/pr_title.txt", "w") as f:
              f.write(pr_title)
          with open("/tmp/pr_body.txt", "w") as f:
              f.write(pr_body)

          with open(GITHUB_OUTPUT, "a") as f:
              f.write("api_success=true\n")
          PYEOF

      - name: Update PR title and description
        if: steps.gemini.outputs.api_success == 'true'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE=$(cat /tmp/pr_title.txt)
          PR_BODY=$(cat /tmp/pr_body.txt)

          gh pr edit "$PR_NUMBER" \
            --title "$PR_TITLE" \
            --body-file /tmp/pr_body.txt \
            --repo ${{ github.repository }}
