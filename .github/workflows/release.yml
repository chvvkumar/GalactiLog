name: Create Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release type and previous tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if echo "$TAG" | grep -qE '\-rc\.[0-9]+$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            # Find the previous rc tag
            PREV_TAG=$(git tag --list --sort=-version:refname \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' \
              | grep -v "^${TAG}$" \
              | head -n 1)
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            # Find the previous release tag (non-rc)
            PREV_TAG=$(git tag --list --sort=-version:refname \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v "^${TAG}$" \
              | head -n 1)
          fi

          if [ -z "$PREV_TAG" ]; then
            echo "prev_tag=" >> "$GITHUB_OUTPUT"
            echo "compare_base=$(git rev-list --max-parents=0 HEAD | head -n 1)" >> "$GITHUB_OUTPUT"
            echo "No previous tag found, using initial commit as base"
          else
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "compare_base=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "Previous tag: $PREV_TAG"
          fi

      - name: Gather changelog data
        id: changelog
        run: |
          BASE="${{ steps.version.outputs.compare_base }}"
          TAG="${{ steps.version.outputs.tag }}"

          GIT_LOG=$(git log "${BASE}..${TAG}" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "No commits found")
          DIFF_STAT=$(git diff --stat "${BASE}..${TAG}" 2>/dev/null || echo "No diff available")

          # Write to files to avoid shell escaping issues
          echo "$GIT_LOG" > /tmp/git_log.txt
          echo "$DIFF_STAT" > /tmp/diff_stat.txt

      - name: Generate release notes with Gemini
        id: notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          GIT_LOG=$(cat /tmp/git_log.txt)
          DIFF_STAT=$(cat /tmp/diff_stat.txt)

          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_TYPE="pre-release (release candidate)"
          else
            RELEASE_TYPE="stable release"
          fi

          if [ -n "$PREV_TAG" ]; then
            RANGE_DESC="Changes from $PREV_TAG to $TAG"
          else
            RANGE_DESC="Initial release: $TAG"
          fi

          PROMPT="Generate professional and succinct release notes for GalactiLog, an astrophotography FITS file catalog application. This is a ${RELEASE_TYPE}.

          ${RANGE_DESC}

          Git commit log:
          ${GIT_LOG}

          Files changed summary:
          ${DIFF_STAT}

          Format the release notes in Markdown with these sections (omit a section if there is nothing relevant):
          - **What's New** -- new features or enhancements
          - **Bug Fixes** -- any bug fixes
          - **Technical Changes** -- infrastructure, refactoring, dependency updates

          Keep it concise. Do not include a title or heading with the version number. Do not use emojis."

          # Build JSON payload
          PAYLOAD=$(jq -n --arg prompt "$PROMPT" '{
            "contents": [{"parts": [{"text": $prompt}]}],
            "generationConfig": {"temperature": 0.7, "maxOutputTokens": 1024}
          }')

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" 2>/dev/null)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            NOTES=$(echo "$BODY" | jq -r '.candidates[0].content.parts[0].text // empty')
            if [ -n "$NOTES" ]; then
              {
                echo "$NOTES"
                echo ""
                echo "---"
                echo "*Release notes generated by AI.*"
              } > /tmp/release_notes.txt
              echo "generated=true" >> "$GITHUB_OUTPUT"
            else
              echo "generated=false" >> "$GITHUB_OUTPUT"
              echo "Gemini returned empty content, falling back to auto-generated notes"
            fi
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
            echo "Gemini API returned HTTP $HTTP_CODE, falling back to auto-generated notes"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"
          AI_NOTES="${{ steps.notes.outputs.generated }}"

          FLAGS=""
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS="--prerelease"
          else
            FLAGS="--latest"
          fi

          if [ "$AI_NOTES" = "true" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release_notes.txt \
              $FLAGS
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $FLAGS
          fi
