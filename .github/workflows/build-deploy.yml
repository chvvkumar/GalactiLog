name: Build and Push Docker Image

on:
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'images/**'
      - 'guides/**'
      - 'docs/**'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          BRANCH="${GITHUB_REF##*/}"
          git fetch --tags --force

          if [ "$BRANCH" = "dev" ]; then
            # Base rc version on next patch after latest stable release
            LATEST_RELEASE=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)

            if [ -z "$LATEST_RELEASE" ]; then
              RC_BASE="1.0.0"
            else
              MAJOR=$(echo "$LATEST_RELEASE" | cut -d. -f1)
              MINOR=$(echo "$LATEST_RELEASE" | cut -d. -f2)
              PATCH=$(echo "$LATEST_RELEASE" | cut -d. -f3)
              RC_BASE="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi

            # Find the latest rc tag for this base version
            LATEST_RC=$(git tag -l | grep -E "^${RC_BASE}-rc\.[0-9]+$" | sort -V | tail -n 1)

            if [ -z "$LATEST_RC" ]; then
              NEXT_VERSION="${RC_BASE}-rc.1"
            else
              RC_NUM=$(echo "$LATEST_RC" | grep -oP '(?<=-rc\.)\d+')
              NEXT_RC=$((RC_NUM + 1))
              NEXT_VERSION="${RC_BASE}-rc.${NEXT_RC}"
            fi

            echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "docker_tags=chvvkumar/galactilog:${NEXT_VERSION},chvvkumar/galactilog:dev" >> "$GITHUB_OUTPUT"

          elif [ "$BRANCH" = "main" ]; then
            # Find the latest release tag (exclude rc tags)
            LATEST_RELEASE=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)

            if [ -z "$LATEST_RELEASE" ]; then
              NEXT_VERSION="1.0.0"
            else
              # Increment patch version
              MAJOR=$(echo "$LATEST_RELEASE" | cut -d. -f1)
              MINOR=$(echo "$LATEST_RELEASE" | cut -d. -f2)
              PATCH=$(echo "$LATEST_RELEASE" | cut -d. -f3)
              NEXT_PATCH=$((PATCH + 1))
              NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
            fi

            echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "docker_tags=chvvkumar/galactilog:${NEXT_VERSION},chvvkumar/galactilog:latest" >> "$GITHUB_OUTPUT"
          fi

          echo "Resolved next version: ${NEXT_VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.docker_tags }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Create and push git tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Determine release type and previous tag
        id: release-version
        run: |
          TAG="${{ steps.version.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if echo "$TAG" | grep -qE '\-rc\.[0-9]+$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            PREV_TAG=$(git tag --list --sort=-version:refname \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' \
              | grep -v "^${TAG}$" \
              | head -n 1)
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            PREV_TAG=$(git tag --list --sort=-version:refname \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v "^${TAG}$" \
              | head -n 1)
          fi

          if [ -z "$PREV_TAG" ]; then
            echo "prev_tag=" >> "$GITHUB_OUTPUT"
            echo "compare_base=$(git rev-list --max-parents=0 HEAD | head -n 1)" >> "$GITHUB_OUTPUT"
          else
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "compare_base=$PREV_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather changelog data
        run: |
          BASE="${{ steps.release-version.outputs.compare_base }}"
          TAG="${{ steps.release-version.outputs.tag }}"

          git log "${BASE}..${TAG}" --pretty=format:"- %s (%h)" --no-merges > /tmp/git_log.txt 2>/dev/null || echo "No commits found" > /tmp/git_log.txt
          git diff --stat "${BASE}..${TAG}" > /tmp/diff_stat.txt 2>/dev/null || echo "No diff available" > /tmp/diff_stat.txt

      - name: Generate release notes with Gemini
        id: notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TAG="${{ steps.release-version.outputs.tag }}"
          PREV_TAG="${{ steps.release-version.outputs.prev_tag }}"
          PRERELEASE="${{ steps.release-version.outputs.prerelease }}"

          GIT_LOG=$(cat /tmp/git_log.txt)
          DIFF_STAT=$(cat /tmp/diff_stat.txt)

          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_TYPE="pre-release (release candidate)"
            RC_NOTE="> **This is a release candidate for testing.** These changes are not yet in the stable channel."
          else
            RELEASE_TYPE="stable release"
            # Find the latest RC tag that preceded this stable release
            GRADUATED_FROM=$(git tag --list --sort=-version:refname \
              | grep -E "^${TAG}-rc\.[0-9]+$" 2>/dev/null \
              | head -n 1 || true)
            if [ -n "$GRADUATED_FROM" ]; then
              RC_NOTE="This stable release graduates changes tested in ${GRADUATED_FROM}."
            else
              RC_NOTE=""
            fi
          fi

          if [ -n "$PREV_TAG" ]; then
            RANGE_DESC="Changes from $PREV_TAG to $TAG"
          else
            RANGE_DESC="Initial release: $TAG"
          fi

          if [ -n "$PREV_TAG" ]; then
            DIFF_SECTION="## Changes since ${PREV_TAG}

          Summarize the key differences between this release and ${PREV_TAG}. Focus on what a user upgrading from ${PREV_TAG} needs to know: what changed, what was added, and what was fixed. Be specific about behavioral differences."
          else
            DIFF_SECTION=""
          fi

          PROMPT="Generate structured release notes for GalactiLog, an astrophotography FITS file catalog application. This is a ${RELEASE_TYPE}.

          ${RANGE_DESC}

          Commit messages:
          ${GIT_LOG}

          Files changed summary:
          ${DIFF_STAT}

          Write with confidence and authority. State what each change does, not what it seems to do. Never use hedging language like 'seems to', 'appears to', 'might', or 'likely'.

          Do NOT use AI phraseology or filler words. Avoid words like: leverage, enhance, streamline, robust, seamless, comprehensive, cutting-edge, utilize, facilitate, empower, elevate, harness, spearhead, foster, bolster, pivotal, groundbreaking, synergy, paradigm, holistic, transformative. Write like a human developer -- plain, direct, technical language only.

          Format the release notes in Markdown with these sections. If a section has ZERO items, do NOT output its heading at all -- omit it entirely:

          ## Highlights
          The top 1-3 most impactful changes for end users, written as short action-oriented bullets.

          ## What's New
          Bullet list of new features or enhancements, grouped by area (e.g. Frontend, Backend, API) if there are many.

          ## Bug Fixes
          Bullet list of bug fixes.

          ## Technical Changes
          Bullet list of infrastructure, refactoring, or dependency updates.

          ## Upgrade Notes
          Any breaking changes, required database migrations, or config changes users must handle when upgrading. Only include this section if there are actual breaking or required changes.

          ${DIFF_SECTION}

          Do not include a title or heading with the version number. Do not use emojis. Keep descriptions concise but specific."

          ESCAPED_PROMPT=$(echo "$PROMPT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{\"parts\": [{\"text\": $ESCAPED_PROMPT}]}],
              \"generationConfig\": {\"temperature\": 0.7, \"maxOutputTokens\": 4096}
            }" 2>/dev/null)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            echo "$BODY" | TAG="$TAG" PREV_TAG="$PREV_TAG" RC_NOTE="$RC_NOTE" python3 -c '
          import sys, json, os
          try:
              data = json.load(sys.stdin)
              text = data["candidates"][0]["content"]["parts"][0]["text"]
              tag = os.environ["TAG"]
              prev_tag = os.environ.get("PREV_TAG", "")
              rc_note = os.environ.get("RC_NOTE", "")
              with open("/tmp/release_notes.txt", "w") as f:
                  if rc_note:
                      f.write(rc_note + "\n\n")
                  f.write(text)
                  f.write("\n\n---\n")
                  f.write(f"## Docker\n\n```\ndocker pull chvvkumar/galactilog:{tag}\n```\n\n")
                  if prev_tag:
                      f.write(f"**Full diff:** https://github.com/chvvkumar/GalactiLog/compare/{prev_tag}...{tag}\n")
          except (KeyError, IndexError, json.JSONDecodeError):
              sys.exit(1)
          '
            if [ $? -eq 0 ] && [ -s /tmp/release_notes.txt ]; then
              echo "generated=true" >> "$GITHUB_OUTPUT"
            else
              echo "generated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release-version.outputs.tag }}"
          PRERELEASE="${{ steps.release-version.outputs.prerelease }}"
          AI_NOTES="${{ steps.notes.outputs.generated }}"

          FLAGS=""
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS="--prerelease"
          else
            FLAGS="--latest"
          fi

          if [ "$AI_NOTES" = "true" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release_notes.txt \
              $FLAGS
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $FLAGS
          fi

      - name: Clean up old dev pre-releases
        if: github.ref == 'refs/heads/dev'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KEEP=2

          # List all pre-release tags sorted by version, newest first
          OLD_TAGS=$(gh release list --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease)] | .[].tagName' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' \
            | sort -rV \
            | tail -n +$((KEEP + 1)))

          for TAG in $OLD_TAGS; do
            echo "Deleting release and tag: $TAG"
            gh release delete "$TAG" --yes --cleanup-tag
          done

      - name: Clean up old Docker Hub images
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          BRANCH: ${{ github.ref_name }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, time
          from urllib.request import Request, urlopen
          from urllib.parse import quote

          REPO = "chvvkumar/galactilog"
          KEEP_RC = 2
          KEEP_STABLE = 5
          BRANCH = os.environ["BRANCH"]

          # Authenticate using env vars (avoids shell interpolation issues)
          login_req = Request("https://hub.docker.com/v2/users/login/",
              data=json.dumps({"username": os.environ["DOCKER_USERNAME"], "password": os.environ["DOCKER_PASSWORD"]}).encode(),
              headers={"Content-Type": "application/json"})
          token = json.loads(urlopen(login_req).read())["token"]
          headers = {"Authorization": f"Bearer {token}"}

          # Fetch all tags
          req = Request(f"https://hub.docker.com/v2/repositories/{REPO}/tags/?page_size=100", headers=headers)
          tags = [t["name"] for t in json.loads(urlopen(req).read())["results"]]

          to_delete = []

          if BRANCH == "dev":
              # Clean up old RC tags, keep newest KEEP_RC
              rc_tags = [t for t in tags if re.match(r"^\d+\.\d+\.\d+-rc\.\d+$", t)]
              rc_tags.sort(key=lambda t: list(map(int, re.findall(r"\d+", t))), reverse=True)
              to_delete = rc_tags[KEEP_RC:]

          elif BRANCH == "main":
              # Clean up old stable tags, keep newest KEEP_STABLE
              stable_tags = [t for t in tags if re.match(r"^\d+\.\d+\.\d+$", t)]
              stable_tags.sort(key=lambda t: list(map(int, t.split("."))), reverse=True)
              to_delete = stable_tags[KEEP_STABLE:]

          if not to_delete:
              print("Nothing to clean up")
          else:
              for tag in to_delete:
                  req = Request(f"https://hub.docker.com/v2/repositories/{REPO}/tags/{quote(tag)}/",
                      headers=headers, method="DELETE")
                  try:
                      urlopen(req)
                      print(f"Deleted: {tag}")
                  except Exception as e:
                      print(f"Failed to delete {tag}: {e}")
                  time.sleep(0.5)
          PYEOF
