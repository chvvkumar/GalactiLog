server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (HSTS omitted - only effective over HTTPS; add to TLS terminator)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://aladin.cds.unistra.fr 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://aladin.cds.unistra.fr https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.unistra.fr https://*.alasky.u-strasbg.fr https://*.cds.unistra.fr; connect-src 'self' data: https://*.unistra.fr https://*.alasky.u-strasbg.fr https://*.cds.unistra.fr https://aa.usno.navy.mil; worker-src 'self' blob:" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    location /thumbnails {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml
        application/wasm;

    # Brotli compression (requires nginx with ngx_brotli module)
    # To enable: switch to an image or package that includes ngx_brotli, e.g.
    #   fholzer/nginx-brotli:latest (standalone nginx image), or
    #   build nginx from source with https://github.com/google/ngx_brotli
    # The runtime image (python:3.12-slim + apt nginx) does not include ngx_brotli.
    # brotli on;
    # brotli_comp_level 6;
    # brotli_min_length 256;
    # brotli_types
    #     text/plain
    #     text/css
    #     application/json
    #     application/javascript
    #     text/xml
    #     application/xml
    #     image/svg+xml
    #     application/wasm;
}
